# prj.conf — Configuración de Kconfig del proyecto
#
# Nota: este archivo activa subsistemas del kernel de Zephyr. Si usas una API y el build
# falla con errores de símbolos no definidos relacionados a un subsistema (ej. "undefined
# reference to k_mutex_init"), casi siempre es porque falta una línea CONFIG_* aquí, NO un
# error de tu código C.

# --- Threading básico ---
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=2048

# --- Punto flotante por hardware (requerido por ntc_sensor.c: logf() en la
# ecuación Beta). Sin esto, math.h funciona pero usa emulación por software,
# mucho más lenta y con más uso de stack. ---
CONFIG_FPU=y

# --- Periféricos ---
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_I2C=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Watchdog (ver discussion.md Sección 4.4 — reinicio ante falla de sensor) ---
CONFIG_WATCHDOG=y

# --- Almacenamiento persistente (NVS, ver SHUTDOWN / flash en discussion.md) ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# --- Logging (recomendado desde el día 1: facilita depurar los 7 hilos concurrentes) ---
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

# --- Utilidades de depuración de threads (útil mientras se aprende Zephyr) ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# --- Shell (opcional, muy útil para probar módulos sueltos por consola serial) ---
# CONFIG_SHELL=y