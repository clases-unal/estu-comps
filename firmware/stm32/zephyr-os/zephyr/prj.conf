# prj.conf — Configuración de Kconfig del proyecto
#
# Si el build falla con "undefined reference to k_xxx" o "CONFIG_XXX not set",
# casi siempre falta una línea aquí. Busca el nombre del CONFIG en:
#   ~/.platformio/packages/framework-zephyr/Kconfig
# o en la documentación de Zephyr para ese subsistema.

# --- Threading ---
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=2048

# --- FPU (requerido por logf() en ntc_sensor.c) ---
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# --- Periféricos de hardware ---
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_I2C=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Display OLED ---
# SSD1306 vía I2C. Si tu pantalla usa otro controlador (SH1106, etc.),
# reemplaza CONFIG_SSD1306 por el driver correspondiente.
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# Character Framebuffer: API de alto nivel para escribir texto en el display.
# Evita tener que manejar framebuffer raw byte a byte.
CONFIG_CHARACTER_FRAMEBUFFER=y
# (NOTA: Las variables obsoletas de tipografía y shell para CFB fueron removidas. 
# En Zephyr 4.4.0, habilitar CHARACTER_FRAMEBUFFER ya carga los recursos por defecto)

# --- CRC (para CRC16 del protocolo UART hacia ESP32) ---
CONFIG_CRC=y

# --- Watchdog ---
CONFIG_WATCHDOG=y

# --- Almacenamiento persistente (NVS — boot count, error counters) ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

# --- Depuración de threads ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y